# madeofcode-tritan — color scheme for kitty (colorblind-safe variant).
# Derived from the madeofcode TextMate/Vim theme.
# Install: copy to ~/.config/kitty/ and add `include madeofcode.conf`
# to your kitty.conf, or run `kitten themes` after placing it on the path.

# -- Basic --
foreground            #f8f8f8
background            #090a1b
selection_foreground  #f8f8f8
selection_background  #05448d

# -- Cursor --
cursor                #00ffff
cursor_text_color     #090a1b

# -- URLs --
url_color             #ff7ab0

# -- Borders --
active_border_color   #00d3a0
inactive_border_color #363745
bell_border_color     #ff3854

# -- Tabs --
active_tab_foreground   #f8f8f8
active_tab_background    #05448d
inactive_tab_foreground  #81818a
inactive_tab_background  #12152e
tab_bar_background       #090a1b

# -- Marks --
mark1_foreground #090a1b
mark1_background #00d3a0
mark2_foreground #090a1b
mark2_background #c050c2
mark3_foreground #090a1b
mark3_background #4fd06a

# -- Normal colors --
color0  #1c1e30
color1  #ff3854
color2  #4fd06a
color3  #ff9d33
color4  #ff7ab0
color5  #c050c2
color6  #00d3a0
color7  #f8f8f8

# -- Bright colors --
color8  #81818a
color9  #cf6a4c
color10 #c7f06a
color11 #cf9f5a
color12 #e06a3a
color13 #d97ddb
color14 #3fd0b0
color15 #ffffff
