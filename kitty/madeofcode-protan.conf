# madeofcode-protan — color scheme for kitty (colorblind-safe variant).
# Derived from the madeofcode TextMate/Vim theme.
# Install: copy to ~/.config/kitty/ and add `include madeofcode.conf`
# to your kitty.conf, or run `kitten themes` after placing it on the path.

# -- Basic --
foreground            #f8f8f8
background            #090a1b
selection_foreground  #f8f8f8
selection_background  #05448d

# -- Cursor --
cursor                #00ffff
cursor_text_color     #090a1b

# -- URLs --
url_color             #2f7bff

# -- Borders --
active_border_color   #b9dcff
inactive_border_color #363745
bell_border_color     #ffc21f

# -- Tabs --
active_tab_foreground   #f8f8f8
active_tab_background    #05448d
inactive_tab_foreground  #81818a
inactive_tab_background  #12152e
tab_bar_background       #090a1b

# -- Marks --
mark1_foreground #090a1b
mark1_background #b9dcff
mark2_foreground #090a1b
mark2_background #7d84b8
mark3_foreground #090a1b
mark3_background #e8e6de

# -- Normal colors --
color0  #1c1e30
color1  #ffc21f
color2  #e8e6de
color3  #b07400
color4  #2f7bff
color5  #7d84b8
color6  #b9dcff
color7  #f8f8f8

# -- Bright colors --
color8  #81818a
color9  #a8863a
color10 #8fb4ff
color11 #d9a441
color12 #0a3d91
color13 #b0b4d8
color14 #9fd0ff
color15 #ffffff
