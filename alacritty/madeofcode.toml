# madeofcode — Alacritty color theme.
# Derived from the madeofcode Vim/TextMate theme (ANSI palette matches kitty/ghostty).
# Install: copy to ~/.config/alacritty/themes/ and add to alacritty.toml:
#   [general]
#   import = ["~/.config/alacritty/themes/madeofcode.toml"]

[colors.primary]
background = "#090a1b"
foreground = "#f8f8f8"

[colors.cursor]
text = "#090a1b"
cursor = "#00ffff"

[colors.vi_mode_cursor]
text = "#090a1b"
cursor = "#588aff"

[colors.selection]
text = "#f8f8f8"
background = "#05448d"

[colors.search.matches]
foreground = "#f8f8f8"
background = "#233466"

[colors.search.focused_match]
foreground = "#090a1b"
background = "#f1d950"

[colors.normal]
black   = "#1c1e30"
red     = "#ff3854"
green   = "#8fff58"
yellow  = "#f1d950"
blue    = "#0a9cff"
magenta = "#c050c2"
cyan    = "#6fd3ff"
white   = "#f8f8f8"

[colors.bright]
black   = "#81818a"
red     = "#cf6a4c"
green   = "#00ffbc"
yellow  = "#e9c062"
blue    = "#588aff"
magenta = "#d97ddb"
cyan    = "#45c1ea"
white   = "#ffffff"
